<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Another World Map</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/d3@7/dist/d3.min.js"></script>
  <script src="https://unpkg.com/topojson@3/dist/topojson.min.js"></script>
  <style>
    .tooltip {
      position: fixed;
      background: rgba(0,0,0,0.8);
      color: white;
      padding: 8px 12px;
      border-radius: 6px;
      pointer-events: none;
      font-size: 13px;
      line-height: 1.5;
      z-index: 9999;
      max-width: 220px;
    }
  </style>
</head>
<body class="bg-gray-100 min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // ISO 3166-1 numeric -> alpha-2 mapping
    const ISO_NUM_TO_A2 = {
      4:'AF', 248:'AX', 8:'AL', 12:'DZ', 16:'AS', 20:'AD', 24:'AO', 660:'AI', 10:'AQ', 28:'AG',
      32:'AR', 51:'AM', 533:'AW', 36:'AU', 40:'AT', 31:'AZ', 44:'BS', 48:'BH', 50:'BD', 52:'BB',
      112:'BY', 56:'BE', 84:'BZ', 204:'BJ', 60:'BM', 64:'BT', 68:'BO', 535:'BQ', 70:'BA', 72:'BW',
      76:'BR', 96:'BN', 100:'BG', 854:'BF', 108:'BI', 132:'CV', 116:'KH', 120:'CM', 124:'CA',
      140:'CF', 148:'TD', 152:'CL', 156:'CN', 170:'CO', 174:'KM', 180:'CD', 178:'CG', 188:'CR',
      384:'CI', 191:'HR', 192:'CU', 531:'CW', 196:'CY', 203:'CZ', 208:'DK', 262:'DJ', 212:'DM',
      214:'DO', 218:'EC', 818:'EG', 222:'SV', 226:'GQ', 232:'ER', 233:'EE', 748:'SZ', 231:'ET',
      242:'FJ', 246:'FI', 250:'FR', 266:'GA', 270:'GM', 268:'GE', 276:'DE', 288:'GH', 300:'GR',
      308:'GD', 320:'GT', 324:'GN', 624:'GW', 328:'GY', 332:'HT', 336:'VA', 340:'HN', 348:'HU',
      352:'IS', 356:'IN', 360:'ID', 364:'IR', 368:'IQ', 372:'IE', 376:'IL', 380:'IT', 388:'JM',
      392:'JP', 400:'JO', 398:'KZ', 404:'KE', 296:'KI', 408:'KP', 410:'KR', 414:'KW', 417:'KG',
      418:'LA', 428:'LV', 422:'LB', 426:'LS', 430:'LR', 434:'LY', 438:'LI', 440:'LT', 442:'LU',
      446:'MO', 450:'MG', 454:'MW', 458:'MY', 462:'MV', 466:'ML', 470:'MT', 584:'MH', 478:'MR',
      480:'MU', 484:'MX', 583:'FM', 498:'MD', 492:'MC', 496:'MN', 499:'ME', 504:'MA', 508:'MZ',
      104:'MM', 516:'NA', 520:'NR', 524:'NP', 528:'NL', 554:'NZ', 558:'NI', 562:'NE', 566:'NG',
      578:'NO', 512:'OM', 586:'PK', 585:'PW', 275:'PS', 591:'PA', 598:'PG', 600:'PY', 604:'PE',
      608:'PH', 616:'PL', 620:'PT', 630:'PR', 634:'QA', 642:'RO', 643:'RU', 646:'RW', 659:'KN',
      662:'LC', 670:'VC', 882:'WS', 674:'SM', 678:'ST', 682:'SA', 686:'SN', 688:'RS', 690:'SC',
      694:'SL', 702:'SG', 703:'SK', 705:'SI', 90:'SB', 706:'SO', 710:'ZA', 728:'SS', 724:'ES',
      144:'LK', 729:'SD', 740:'SR', 752:'SE', 756:'CH', 760:'SY', 762:'TJ', 834:'TZ', 764:'TH',
      626:'TL', 768:'TG', 776:'TO', 780:'TT', 788:'TN', 792:'TR', 795:'TM', 798:'TV', 800:'UG',
      804:'UA', 784:'AE', 826:'GB', 840:'US', 858:'UY', 860:'UZ', 548:'VU', 862:'VE', 704:'VN',
      887:'YE', 894:'ZM', 716:'ZW', 807:'MK', 158:'TW'
    };

    // ── WorldMap ──────────────────────────────────────────────────────────────
    function WorldMap({ data = [], loading = false, labelKey = 'leader_name', valueLabel = 'Age' }) {
      const svgRef = useRef(null);
      const containerRef = useRef(null);
      const [geoData, setGeoData] = useState(null);
      const [tooltip, setTooltip] = useState({ visible: false, x: 0, y: 0, html: '' });

      useEffect(() => {
        fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json')
          .then(r => r.json())
          .then(topo => setGeoData(topojson.feature(topo, topo.objects.countries)))
          .catch(console.error);
      }, []);

      useEffect(() => {
        if (!geoData || !containerRef.current) return;
        const width = containerRef.current.clientWidth || 800;
        const height = width * 0.5;
        const svg = d3.select(svgRef.current);
        svg.selectAll('*').remove();
        svg.attr('width', width).attr('height', height);

        const projection = d3.geoNaturalEarth1()
          .scale(width / (2 * Math.PI))
          .translate([width / 2, height / 2]);
        const path = d3.geoPath().projection(projection);

        const dataMap = new Map(data.map(d => [d.iso2, d]));

        svg.selectAll('path')
          .data(geoData.features)
          .enter().append('path')
          .attr('d', path)
          .attr('fill', d => {
            const iso2 = ISO_NUM_TO_A2[+d.id];
            const entry = iso2 ? dataMap.get(iso2) : null;
            return entry ? entry.hex_color : '#d1d5db';
          })
          .attr('stroke', '#fff')
          .attr('stroke-width', 0.4)
          .on('mouseover', (event, d) => {
            const iso2 = ISO_NUM_TO_A2[+d.id];
            const entry = iso2 ? dataMap.get(iso2) : null;
            let html = `<strong>${entry ? entry.country : (iso2 || 'Unknown')}</strong>`;
            if (entry) {
              if (entry[labelKey]) html += `<br/>${labelKey.replace(/_/g,' ')}: ${entry[labelKey]}`;
              if (entry.age !== undefined) html += `<br/>${valueLabel}: ${entry.age}`;
              if (entry.average_age !== undefined) html += `<br/>Avg ${valueLabel}: ${entry.average_age}`;
            } else {
              html += '<br/>No data';
            }
            setTooltip({ visible: true, x: event.clientX + 12, y: event.clientY - 10, html });
          })
          .on('mousemove', event => {
            setTooltip(t => ({ ...t, x: event.clientX + 12, y: event.clientY - 10 }));
          })
          .on('mouseout', () => setTooltip(t => ({ ...t, visible: false })));
      }, [geoData, data]);

      return (
        <div ref={containerRef} style={{ position: 'relative', width: '100%' }}>
          {loading && <div className="text-center py-8 text-gray-500">Loading map data...</div>}
          <svg ref={svgRef} style={{ width: '100%' }} />
          {tooltip.visible && (
            <div
              className="tooltip"
              style={{ left: tooltip.x, top: tooltip.y }}
              dangerouslySetInnerHTML={{ __html: tooltip.html }}
            />
          )}
        </div>
      );
    }

    // ── ColorLegend ───────────────────────────────────────────────────────────
    function ColorLegend({ minLabel = 'Young (30)', maxLabel = 'Old (90+)' }) {
      return (
        <div className="flex items-center gap-3 mt-3">
          <span className="text-xs text-gray-600">{minLabel}</span>
          <div
            className="flex-1 h-4 rounded"
            style={{ background: 'linear-gradient(to right, #FFD700, #111111)' }}
          />
          <span className="text-xs text-gray-600">{maxLabel}</span>
        </div>
      );
    }

    // ── App ───────────────────────────────────────────────────────────────────
    const TABS = ['Leaders', 'Parliament', 'Suggestions', 'Hall of Fame'];

    function App() {
      const [activeTab, setActiveTab] = useState('Leaders');
      const [leadersData, setLeadersData] = useState([]);
      const [parliamentData, setParliamentData] = useState([]);
      const [suggestions, setSuggestions] = useState([]);
      const [hallOfFame, setHallOfFame] = useState([]);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState(null);
      const [form, setForm] = useState({ user_name: '', topic: '', description: '' });
      const [submitting, setSubmitting] = useState(false);

      const API_BASE = 'https://another-world-map.fly.dev';
      const apiFetch = useCallback(async (url, opts = {}) => {
        const res = await fetch(API_BASE + url, { headers: { 'Content-Type': 'application/json' }, ...opts });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return res.json();
      }, []);

      const loadTab = useCallback(async (tab) => {
        setLoading(true);
        setError(null);
        try {
          if (tab === 'Leaders' && leadersData.length === 0) {
            setLeadersData(await apiFetch('/api/leaders'));
          } else if (tab === 'Parliament' && parliamentData.length === 0) {
            setParliamentData(await apiFetch('/api/parliament'));
          } else if (tab === 'Suggestions') {
            setSuggestions(await apiFetch('/api/suggestions'));
          } else if (tab === 'Hall of Fame') {
            setHallOfFame(await apiFetch('/api/hall-of-fame'));
          }
        } catch (e) {
          setError(e.message);
        } finally {
          setLoading(false);
        }
      }, [leadersData.length, parliamentData.length, apiFetch]);

      useEffect(() => { loadTab('Leaders'); }, []);

      const handleTabClick = (tab) => {
        setActiveTab(tab);
        loadTab(tab);
      };

      const handleVote = async (id) => {
        try {
          const updated = await apiFetch(`/api/vote/${id}`, { method: 'POST' });
          setSuggestions(prev => prev.map(s => s.id === id ? updated : s));
        } catch (e) {
          setError(e.message);
        }
      };

      const handleSubmit = async (e) => {
        e.preventDefault();
        setSubmitting(true);
        try {
          await apiFetch('/api/suggest', { method: 'POST', body: JSON.stringify(form) });
          setForm({ user_name: '', topic: '', description: '' });
          setSuggestions(await apiFetch('/api/suggestions'));
        } catch (e) {
          setError(e.message);
        } finally {
          setSubmitting(false);
        }
      };

      const renderContent = () => {
        if (error) return <div className="p-6 text-red-500">Error: {error}</div>;

        switch (activeTab) {
          case 'Leaders':
            return (
              <div>
                <WorldMap data={leadersData} loading={loading} labelKey="leader_name" valueLabel="Age" />
                <ColorLegend />
                {!loading && leadersData.length > 0 && (
                  <div className="mt-4 overflow-auto max-h-64">
                    <table className="w-full text-sm">
                      <thead><tr className="bg-gray-100">
                        <th className="text-left p-2">Country</th>
                        <th className="text-left p-2">Leader</th>
                        <th className="text-left p-2">Age</th>
                      </tr></thead>
                      <tbody>
                        {[...leadersData].sort((a,b) => b.age - a.age).map(d => (
                          <tr key={d.iso2} className="border-b hover:bg-gray-50">
                            <td className="p-2">{d.country}</td>
                            <td className="p-2">{d.leader_name}</td>
                            <td className="p-2 font-semibold" style={{ color: d.hex_color === '#111111' ? '#555' : d.hex_color }}>
                              {d.age}
                            </td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                )}
              </div>
            );

          case 'Parliament':
            return (
              <div>
                <WorldMap data={parliamentData} loading={loading} labelKey="country" valueLabel="Avg Age" />
                <ColorLegend minLabel="Young avg (30)" maxLabel="Old avg (90+)" />
                {!loading && parliamentData.length > 0 && (
                  <div className="mt-4 overflow-auto max-h-64">
                    <table className="w-full text-sm">
                      <thead><tr className="bg-gray-100">
                        <th className="text-left p-2">Country</th>
                        <th className="text-left p-2">Avg Age</th>
                      </tr></thead>
                      <tbody>
                        {[...parliamentData].sort((a,b) => b.average_age - a.average_age).map(d => (
                          <tr key={d.iso2} className="border-b hover:bg-gray-50">
                            <td className="p-2">{d.country}</td>
                            <td className="p-2 font-semibold">{d.average_age}</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                )}
              </div>
            );

          case 'Suggestions':
            return (
              <div className="p-4">
                <h2 className="text-xl font-bold mb-4">Suggest a Topic</h2>
                <form onSubmit={handleSubmit} className="bg-gray-50 rounded-lg p-4 mb-6 space-y-3">
                  <input
                    type="text" placeholder="Your name" required maxLength={100}
                    value={form.user_name}
                    onChange={e => setForm(f => ({ ...f, user_name: e.target.value }))}
                    className="w-full border rounded px-3 py-2 text-sm"
                  />
                  <input
                    type="text" placeholder="Topic (e.g. Minister average age)" required maxLength={200}
                    value={form.topic}
                    onChange={e => setForm(f => ({ ...f, topic: e.target.value }))}
                    className="w-full border rounded px-3 py-2 text-sm"
                  />
                  <textarea
                    placeholder="Description (optional)" maxLength={1000}
                    value={form.description}
                    onChange={e => setForm(f => ({ ...f, description: e.target.value }))}
                    className="w-full border rounded px-3 py-2 text-sm h-20"
                  />
                  <button
                    type="submit" disabled={submitting}
                    className="bg-blue-600 text-white px-4 py-2 rounded text-sm hover:bg-blue-700 disabled:opacity-50"
                  >
                    {submitting ? 'Submitting...' : 'Submit'}
                  </button>
                </form>

                <h2 className="text-xl font-bold mb-3">All Suggestions</h2>
                {loading && <p className="text-gray-400 text-sm">Loading...</p>}
                <div className="space-y-3">
                  {suggestions.map(s => (
                    <div key={s.id} className="bg-white border rounded-lg p-4 flex justify-between items-start">
                      <div>
                        <p className="font-semibold">{s.topic}</p>
                        {s.description && <p className="text-sm text-gray-600 mt-1">{s.description}</p>}
                        <p className="text-xs text-gray-400 mt-1">by {s.user_name}</p>
                      </div>
                      <button
                        onClick={() => handleVote(s.id)}
                        className="flex flex-col items-center ml-4 text-blue-600 hover:text-blue-800"
                      >
                        <span className="text-lg">▲</span>
                        <span className="text-sm font-bold">{s.votes}</span>
                      </button>
                    </div>
                  ))}
                  {!loading && suggestions.length === 0 && (
                    <p className="text-gray-400 text-sm">No suggestions yet. Be the first!</p>
                  )}
                </div>
              </div>
            );

          case 'Hall of Fame':
            return (
              <div className="p-4">
                <h2 className="text-xl font-bold mb-4">Hall of Fame</h2>
                <p className="text-sm text-gray-500 mb-4">Top contributors whose topic suggestions received the most votes.</p>
                {loading && <p className="text-gray-400 text-sm">Loading...</p>}
                <ol className="space-y-2">
                  {hallOfFame.map((entry, i) => (
                    <li key={entry.user_name} className="flex items-center gap-4 bg-white border rounded-lg p-3">
                      <span className={`text-2xl font-black w-8 text-center ${i === 0 ? 'text-yellow-500' : i === 1 ? 'text-gray-400' : i === 2 ? 'text-amber-600' : 'text-gray-300'}`}>
                        {i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `#${i+1}`}
                      </span>
                      <span className="font-semibold flex-1">{entry.user_name}</span>
                      <span className="text-blue-600 font-bold">{entry.total_votes} votes</span>
                    </li>
                  ))}
                  {!loading && hallOfFame.length === 0 && (
                    <p className="text-gray-400 text-sm">No entries yet. Submit and vote on suggestions!</p>
                  )}
                </ol>
              </div>
            );

          default: return null;
        }
      };

      return (
        <div className="max-w-5xl mx-auto">
          <header className="bg-white shadow-sm px-6 py-4 mb-0">
            <h1 className="text-2xl font-black text-gray-800">Another World Map</h1>
            <p className="text-sm text-gray-500">Countries colored by the age of their leaders</p>
          </header>

          <nav className="bg-white border-b px-6 flex gap-1">
            {TABS.map(tab => (
              <button
                key={tab}
                onClick={() => handleTabClick(tab)}
                className={`px-4 py-3 text-sm font-medium border-b-2 transition-colors ${
                  activeTab === tab
                    ? 'border-blue-600 text-blue-600'
                    : 'border-transparent text-gray-500 hover:text-gray-800'
                }`}
              >
                {tab}
              </button>
            ))}
          </nav>

          <main className="bg-white shadow-sm min-h-96">
            {renderContent()}
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
