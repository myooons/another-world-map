<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Another World Map</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/d3@7/dist/d3.min.js"></script>
  <script src="https://unpkg.com/topojson@3/dist/topojson.min.js"></script>
  <!-- Google AdSense -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3931196285292252" crossorigin="anonymous"></script>
  <style>
    * { box-sizing: border-box; }
    body { background: #f1f5f9; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .tooltip {
      position: fixed;
      background: rgba(15,23,42,0.92);
      color: #f8fafc;
      padding: 10px 14px;
      border-radius: 10px;
      pointer-events: none;
      font-size: 13px;
      line-height: 1.6;
      z-index: 9999;
      max-width: 230px;
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    .tab-btn {
      padding: 12px 18px;
      font-size: 13px;
      font-weight: 500;
      border: none;
      background: none;
      cursor: pointer;
      white-space: nowrap;
      color: #64748b;
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
    }
    .tab-btn:hover { color: #1e293b; }
    .tab-btn.active { color: #3b82f6; border-bottom-color: #3b82f6; }
    .data-table th {
      position: sticky; top: 0;
      background: #f8fafc;
      padding: 10px 14px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #94a3b8;
      border-bottom: 1px solid #e2e8f0;
      text-align: left;
    }
    .data-table td { padding: 9px 14px; font-size: 13px; color: #334155; border-bottom: 1px solid #f1f5f9; }
    .data-table tr:hover td { background: #f8fafc; }
    .data-table tr:last-child td { border-bottom: none; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 9999px; font-size: 12px; font-weight: 600; }
    svg path { transition: stroke-width 0.1s; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    const ISO_NUM_TO_A2 = {
      4:'AF',248:'AX',8:'AL',12:'DZ',16:'AS',20:'AD',24:'AO',660:'AI',10:'AQ',28:'AG',
      32:'AR',51:'AM',533:'AW',36:'AU',40:'AT',31:'AZ',44:'BS',48:'BH',50:'BD',52:'BB',
      112:'BY',56:'BE',84:'BZ',204:'BJ',60:'BM',64:'BT',68:'BO',535:'BQ',70:'BA',72:'BW',
      76:'BR',96:'BN',100:'BG',854:'BF',108:'BI',132:'CV',116:'KH',120:'CM',124:'CA',
      140:'CF',148:'TD',152:'CL',156:'CN',170:'CO',174:'KM',180:'CD',178:'CG',188:'CR',
      384:'CI',191:'HR',192:'CU',531:'CW',196:'CY',203:'CZ',208:'DK',262:'DJ',212:'DM',
      214:'DO',218:'EC',818:'EG',222:'SV',226:'GQ',232:'ER',233:'EE',748:'SZ',231:'ET',
      242:'FJ',246:'FI',250:'FR',266:'GA',270:'GM',268:'GE',276:'DE',288:'GH',300:'GR',
      308:'GD',320:'GT',324:'GN',624:'GW',328:'GY',332:'HT',336:'VA',340:'HN',348:'HU',
      352:'IS',356:'IN',360:'ID',364:'IR',368:'IQ',372:'IE',376:'IL',380:'IT',388:'JM',
      392:'JP',400:'JO',398:'KZ',404:'KE',296:'KI',408:'KP',410:'KR',414:'KW',417:'KG',
      418:'LA',428:'LV',422:'LB',426:'LS',430:'LR',434:'LY',438:'LI',440:'LT',442:'LU',
      446:'MO',450:'MG',454:'MW',458:'MY',462:'MV',466:'ML',470:'MT',584:'MH',478:'MR',
      480:'MU',484:'MX',583:'FM',498:'MD',492:'MC',496:'MN',499:'ME',504:'MA',508:'MZ',
      104:'MM',516:'NA',520:'NR',524:'NP',528:'NL',554:'NZ',558:'NI',562:'NE',566:'NG',
      578:'NO',512:'OM',586:'PK',585:'PW',275:'PS',591:'PA',598:'PG',600:'PY',604:'PE',
      608:'PH',616:'PL',620:'PT',630:'PR',634:'QA',642:'RO',643:'RU',646:'RW',659:'KN',
      662:'LC',670:'VC',882:'WS',674:'SM',678:'ST',682:'SA',686:'SN',688:'RS',690:'SC',
      694:'SL',702:'SG',703:'SK',705:'SI',90:'SB',706:'SO',710:'ZA',728:'SS',724:'ES',
      144:'LK',729:'SD',740:'SR',752:'SE',756:'CH',760:'SY',762:'TJ',834:'TZ',764:'TH',
      626:'TL',768:'TG',776:'TO',780:'TT',788:'TN',792:'TR',795:'TM',798:'TV',800:'UG',
      804:'UA',784:'AE',826:'GB',840:'US',858:'UY',860:'UZ',548:'VU',862:'VE',704:'VN',
      887:'YE',894:'ZM',716:'ZW',807:'MK',158:'TW'
    };

    const MAP_TABS = [
      { id:'Leaders',          dbKey:'leaders',         minLabel:'Young (30)',    maxLabel:'Old (90+)',       reversed:false, valueKey:'age',   valueLabel:'Age',             unit:'',    extraTooltip: e => e.leader_name ? `<span style="color:#94a3b8;font-size:11px">Leader</span><br/>${e.leader_name}<br/>` : '', source:'Wikidata' },
      { id:'Median Age',       dbKey:'median_age',      minLabel:'Young (15yr)',  maxLabel:'Old (55yr)',      reversed:false, valueKey:'value', valueLabel:'Median Age',      unit:'yr',  source:'Our World in Data (UN)' },
      { id:'Life Expectancy',  dbKey:'life_expectancy', minLabel:'Short (50yr)',  maxLabel:'Long (85yr)',     reversed:true,  valueKey:'value', valueLabel:'Life Expectancy', unit:'yr',  source:'Our World in Data (UN)' },
      { id:'Happiness',        dbKey:'happiness',       minLabel:'Unhappy (2)',   maxLabel:'Happy (8)',       reversed:true,  valueKey:'value', valueLabel:'Happiness',       unit:'',    source:'Our World in Data (World Happiness Report)' },
      { id:'Press Freedom',    dbKey:'press_freedom',   minLabel:'Free (0)',      maxLabel:'Not Free (2)',    reversed:false, valueKey:'value', valueLabel:'Press Index',     unit:'',    source:'Our World in Data (Freedom House) · 0=Not Free · 1=Partly Free · 2=Free' },
      { id:'Military Exp.',    dbKey:'military_expenditure', minLabel:'Low (0%)',  maxLabel:'High (10%+)',    reversed:false, valueKey:'value', valueLabel:'Military Exp.',   unit:'% GDP', source:'Our World in Data (SIPRI)' },
      { id:'Corruption',       dbKey:'corruption_index', minLabel:'Corrupt (0)',  maxLabel:'Clean (100)',    reversed:true,  valueKey:'value', valueLabel:'CPI',             unit:'',    source:'Our World in Data (Transparency International) · 0=Highly Corrupt · 100=Very Clean' },
    ];
    const SOCIAL_TABS = ['Suggestions', 'Hall of Fame'];
    const ALL_TABS = [...MAP_TABS.map(t => t.id), ...SOCIAL_TABS];

    function getRegionCenter(lon) {
      if (lon > 30 && lon <= 180)  return 130;   // Asia / Pacific / Australia
      if (lon >= -30 && lon <= 30) return 10;    // Europe / Africa
      return -90;                                 // Americas
    }

    // ── WorldMap ─────────────────────────────────────────────────────────────
    function WorldMap({ data = [], loading = false, tabCfg, centerLon = 0 }) {
      const svgRef = useRef(null);
      const containerRef = useRef(null);
      const [geoData, setGeoData] = useState(null);
      const [tooltip, setTooltip] = useState({ visible: false, x: 0, y: 0, html: '' });

      useEffect(() => {
        fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json')
          .then(r => r.json())
          .then(topo => setGeoData(topojson.feature(topo, topo.objects.countries)))
          .catch(console.error);
      }, []);

      useEffect(() => {
        if (!geoData || !containerRef.current) return;
        const width = Math.min(containerRef.current.clientWidth || 900, 480);
        const height = width;
        const svg = d3.select(svgRef.current);
        svg.selectAll('*').remove();
        svg.attr('viewBox', `0 0 ${width} ${height}`).attr('width', '100%').attr('height', height);

        const baseScale = width / (2 * Math.PI) * 1.6;
        let currentScale = baseScale;
        let currentRotate = [-centerLon, 0];

        const projection = d3.geoOrthographic()
          .rotate(currentRotate)
          .scale(currentScale)
          .translate([width / 2, height / 2])
          .clipAngle(90);
        const path = d3.geoPath().projection(projection);
        const dataMap = new Map(data.map(d => [d.iso2, d]));

        const g = svg.append('g');

        g.append('path')
          .datum({type: 'Sphere'})
          .attr('d', path)
          .attr('fill', '#1e3a5f');

        g.append('path')
          .datum(d3.geoGraticule()())
          .attr('d', path)
          .attr('fill', 'none')
          .attr('stroke', '#334155')
          .attr('stroke-width', 0.2);

        const paths = g.selectAll('path.country')
          .data(geoData.features)
          .enter().append('path')
          .attr('class', 'country')
          .attr('d', path)
          .attr('fill', d => {
            const iso2 = ISO_NUM_TO_A2[+d.id];
            const entry = iso2 ? dataMap.get(iso2) : null;
            return entry ? entry.hex_color : '#cbd5e1';
          })
          .attr('stroke', '#ffffff')
          .attr('stroke-width', 0.4)
          .style('cursor', 'grab');

        function redraw() {
          projection.scale(currentScale).rotate(currentRotate);
          g.selectAll('path').attr('d', path);
          paths.attr('stroke-width', 0.4 * (baseScale / currentScale));
        }

        paths
          .on('mouseover', function(event, d) {
            d3.select(this).raise().attr('stroke', '#facc15').attr('stroke-width', 1.8 * (baseScale / currentScale));
            const iso2 = ISO_NUM_TO_A2[+d.id];
            const entry = iso2 ? dataMap.get(iso2) : null;
            let html = `<strong style="font-size:14px">${entry ? entry.country : (iso2 || 'Unknown')}</strong>`;
            if (entry) {
              if (tabCfg.extraTooltip) html += '<br/>' + tabCfg.extraTooltip(entry);
              const val = entry[tabCfg.valueKey];
              if (val !== undefined) html += `<span style="color:#94a3b8;font-size:11px">${tabCfg.valueLabel}</span><br/><strong style="font-size:18px;color:#facc15">${val}</strong>${tabCfg.unit}`;
            } else {
              html += '<br/><span style="color:#64748b">No data</span>';
            }
            setTooltip({ visible: true, x: event.clientX + 14, y: event.clientY - 14, html });
          })
          .on('mousemove', event => {
            setTooltip(t => ({ ...t, x: event.clientX + 14, y: event.clientY - 14 }));
          })
          .on('mouseout', function() {
            d3.select(this).attr('stroke', '#ffffff').attr('stroke-width', 0.4 * (baseScale / currentScale));
            setTooltip(t => ({ ...t, visible: false }));
          });

        svg.on('wheel', (event) => {
          event.preventDefault();
          const factor = event.deltaY > 0 ? 0.85 : 1.15;
          currentScale = Math.max(baseScale * 0.5, Math.min(baseScale * 8, currentScale * factor));
          redraw();
        });

        const sensitivity = 75 / baseScale;
        svg.call(
          d3.drag()
            .on('start', () => { svg.style('cursor', 'grabbing'); setTooltip(t => ({ ...t, visible: false })); })
            .on('drag', (event) => {
              currentRotate = [
                currentRotate[0] + event.dx * sensitivity,
                Math.max(-90, Math.min(90, currentRotate[1] - event.dy * sensitivity)),
              ];
              redraw();
            })
            .on('end', () => { svg.style('cursor', 'grab'); })
        );
      }, [geoData, data, tabCfg, centerLon]);

      return (
        <div ref={containerRef} style={{ position: 'relative', width: '100%', background: '#0f172a', borderRadius: '0 0 0 0', display: 'flex', justifyContent: 'center' }}>
          {loading && (
            <div style={{ position:'absolute', inset:0, display:'flex', alignItems:'center', justifyContent:'center', color:'#64748b', fontSize:14 }}>
              Loading data...
            </div>
          )}
          <svg ref={svgRef} style={{ display: 'block', width: '100%' }} />
          {tooltip.visible && (
            <div className="tooltip" style={{ left: tooltip.x, top: tooltip.y }}
              dangerouslySetInnerHTML={{ __html: tooltip.html }} />
          )}
        </div>
      );
    }

    // ── ColorLegend ───────────────────────────────────────────────────────────
    function ColorLegend({ minLabel, maxLabel, reversed }) {
      const gradient = reversed
        ? 'linear-gradient(to right, #111111, #FFD700)'
        : 'linear-gradient(to right, #FFD700, #111111)';
      const leftLabel  = reversed ? maxLabel : minLabel;
      const rightLabel = reversed ? minLabel : maxLabel;
      return (
        <div style={{ display:'flex', alignItems:'center', gap:12, padding:'12px 20px', borderTop:'1px solid #e2e8f0' }}>
          <span style={{ fontSize:12, color:'#94a3b8', whiteSpace:'nowrap' }}>{leftLabel}</span>
          <div style={{ flex:1, height:10, borderRadius:99, background:gradient }} />
          <span style={{ fontSize:12, color:'#94a3b8', whiteSpace:'nowrap' }}>{rightLabel}</span>
        </div>
      );
    }

    // ── App ───────────────────────────────────────────────────────────────────
    function App() {
      const [activeTab, setActiveTab]   = useState('Leaders');
      const [mapData, setMapData]       = useState({});
      const [loading, setLoading]       = useState(false);
      const [error, setError]           = useState(null);
      const [centerLon, setCenterLon]   = useState(null);
      const [updatedAt, setUpdatedAt]   = useState(null);

      const RAW_BASE = 'https://raw.githubusercontent.com/myooons/another-world-map/master/data';

      // Detect user region for map centering
      useEffect(() => {
        const timer = setTimeout(() => { if (centerLon === null) setCenterLon(0); }, 2500);
        fetch('https://ipwho.is/')
          .then(r => r.json())
          .then(d => {
            clearTimeout(timer);
            setCenterLon(d.longitude ?? 0);
          })
          .catch(() => { clearTimeout(timer); setCenterLon(0); });
        return () => clearTimeout(timer);
      }, []);

      const loadTab = useCallback(async (tab) => {
        setError(null);
        const mapTab = MAP_TABS.find(t => t.id === tab);
        if (!mapTab) return;
        if (mapData[mapTab.dbKey]) return;
        setLoading(true);
        try {
          const res = await fetch(`${RAW_BASE}/${mapTab.dbKey}.json`);
          if (!res.ok) throw new Error('Data not available yet — check back after the next weekly update.');
          const json = await res.json();
          setMapData(prev => ({ ...prev, [mapTab.dbKey]: json.data }));
          setUpdatedAt(json.updated_at);
        } catch (e) { setError(e.message); }
        finally { setLoading(false); }
      }, [mapData]);

      useEffect(() => { loadTab('Leaders'); }, []);

      const handleTabClick = tab => { setActiveTab(tab); loadTab(tab); };


      const renderContent = () => {
        if (error) return (
          <div style={{ padding:24, color:'#ef4444', background:'#fef2f2', margin:16, borderRadius:8, fontSize:13 }}>
            Error: {error}
          </div>
        );

        const mapTab = MAP_TABS.find(t => t.id === activeTab);
        if (mapTab) {
          const data = mapData[mapTab.dbKey] || [];
          const sorted = [...data].sort((a,b) => (b[mapTab.valueKey]||0)-(a[mapTab.valueKey]||0));
          return (
            <div>
              {centerLon !== null && (
                <WorldMap data={data} loading={loading} tabCfg={mapTab} centerLon={centerLon} />
              )}
              <ColorLegend minLabel={mapTab.minLabel} maxLabel={mapTab.maxLabel} reversed={mapTab.reversed} />
              {updatedAt && (
                <div style={{ padding:'0 20px 8px', fontSize:11, color:'#cbd5e1' }}>
                  Data updated: {new Date(updatedAt).toLocaleDateString()}{mapTab.source && <span style={{ marginLeft:12, color:'#64748b' }}>Source: {mapTab.source}</span>}
                </div>
              )}
              {!loading && data.length > 0 && (
                <div style={{ maxHeight:280, overflowY:'auto', borderTop:'1px solid #e2e8f0' }}>
                  <table className="data-table" style={{ width:'100%', borderCollapse:'collapse' }}>
                    <thead>
                      <tr>
                        <th>#</th>
                        <th>Country</th>
                        {mapTab.id === 'Leaders' && <th>Leader</th>}
                        <th>{mapTab.valueLabel}</th>
                      </tr>
                    </thead>
                    <tbody>
                      {sorted.map((d, i) => (
                        <tr key={d.iso2}>
                          <td style={{ color:'#cbd5e1', width:36 }}>{i+1}</td>
                          <td style={{ fontWeight:500 }}>{d.country}</td>
                          {mapTab.id === 'Leaders' && <td style={{ color:'#64748b' }}>{d.leader_name}</td>}
                          <td>
                            <span className="badge" style={{ background: d.hex_color === '#111111' ? '#e2e8f0' : d.hex_color + '22', color: d.hex_color === '#111111' ? '#475569' : d.hex_color }}>
                              {d[mapTab.valueKey]}{mapTab.unit}
                            </span>
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              )}
            </div>
          );
        }

        if (activeTab === 'Suggestions' || activeTab === 'Hall of Fame') return (
          <div style={{ padding:48, textAlign:'center', color:'#94a3b8', fontSize:14 }}>
            Social features are currently unavailable.
          </div>
        );

        return null;
      };

      return (
        <div style={{ maxWidth:960, margin:'0 auto', minHeight:'100vh' }}>
          {/* Header */}
          <header style={{ background:'linear-gradient(135deg, #0f172a 0%, #1e293b 100%)', padding:'24px 28px' }}>
            <div style={{ display:'flex', alignItems:'flex-end', justifyContent:'space-between' }}>
              <div>
                <h1 style={{ fontSize:28, fontWeight:900, color:'white', letterSpacing:'-0.5px', margin:0 }}>
                  Another World Map
                </h1>
                <p style={{ fontSize:13, color:'#64748b', margin:'4px 0 0' }}>A different view of the world</p>
              </div>
              <div style={{ display:'flex', gap:6 }}>
                {MAP_TABS.map(t => (
                  <div key={t.id} style={{ width:8, height:8, borderRadius:99, background: activeTab === t.id ? '#facc15' : '#334155' }} />
                ))}
              </div>
            </div>
          </header>

          {/* Tabs */}
          <nav style={{ background:'white', borderBottom:'1px solid #e2e8f0', display:'flex', overflowX:'auto', padding:'0 8px' }}>
            {ALL_TABS.map(tab => (
              <button key={tab} onClick={() => handleTabClick(tab)}
                className={`tab-btn${activeTab === tab ? ' active' : ''}`}>
                {tab}
              </button>
            ))}
          </nav>

          {/* Main */}
          <main style={{ background:'white', boxShadow:'0 1px 3px rgba(0,0,0,0.06)', minHeight:400 }}>
            {renderContent()}
          </main>

          {/* Footer */}
          <footer style={{ padding:'16px 20px', fontSize:11, color:'#94a3b8', textAlign:'center' }}>
            Data: <a href="https://www.wikidata.org" style={{ color:'#94a3b8' }}>Wikidata</a> ·{' '}
            <a href="https://ourworldindata.org" style={{ color:'#94a3b8' }}>Our World in Data</a> · Updated weekly
            {' '}·{' '}
            <a href="https://ko-fi.com/myooons" target="_blank" rel="noopener" style={{ color:'#facc15', fontWeight:600 }}>☕ Support on Ko-fi</a>
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
  <!-- Ko-fi floating widget -->
  <script src='https://storage.ko-fi.com/cdn/scripts/overlay-widget.js'></script>
  <script>
    kofiWidgetOverlay.draw('myooons', {
      'type': 'floating-chat',
      'floating-chat.donateButton.text': 'Support',
      'floating-chat.donateButton.background-color': '#facc15',
      'floating-chat.donateButton.text-color': '#1e293b'
    });
  </script>
</body>
</html>
